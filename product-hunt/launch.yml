# Product Hunt launch draft for AlbumCoverGenerator.
# Validated against ./spec.yml via `npm run validate:ph`.

name: AlbumCoverGenerator

tagline: One-of-a-kind album covers from emojis, gradients, and text.

description: >-
  Pick a palette, hit Shuffle Everything, and walk away with a 3000x3000
  album cover ready to download as JPEG or PNG. No login, no signup,
  no AI hallucinations. Just an instant, in-browser canvas tool for
  musicians, podcasters, and playlist makers.

topics:
  - design-tools
  - music
  - art

first_comment: >-
  Hey Hunters! I'm Moises, and I made AlbumCoverGenerator because every
  time I shipped a playlist or a one-off mix on Spotify, I got stuck for
  20 minutes trying to design a cover that didn't look like a stock
  template. So I built the dumbest possible alternative: emojis,
  gradients, and one line of bold text on a 3000x3000 canvas.


  The whole thing runs client-side. You pick two colors, choose a linear
  or radial gradient, drop in any emoji palette you like, and tune the
  count, rotation, and opacity. Then you add the album title and artist
  name, pick a font, and hit Download. There's a Shuffle Everything
  button if you want the dice to roll for you, and a debounced
  auto-regenerate so the canvas keeps up while you tweak sliders.


  No accounts. No watermarks. No AI generation, so nothing weird shows
  up. Just deterministic, generative emoji art you can export as JPEG
  or PNG (with a 20MB guard before the download starts).


  I'd love to hear: what other generative covers would you want? More
  layouts? Pattern overlays? Pixel art? Drop a comment with the kind of
  cover you wish existed and I'll build it next.

links:
  website: https://albumcovergenerator.vercel.app
  github: https://github.com/mtrejo0/AlbumCoverGenerator
