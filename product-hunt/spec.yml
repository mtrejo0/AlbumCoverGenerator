# Product Hunt launch field constraints.
#
# Sources (last verified 2026-05-10):
#   https://help.producthunt.com/en/articles/479557-how-to-post-a-product
#   https://www.producthunt.com/launch/definitions
#   https://signals.sh/blog/how-to-write-product-hunt-first-comment
#
# Field types:
#   hard - Product Hunt enforces this. MUST pass.
#   soft - Best practice / community guideline. SHOULD pass.

fields:
  name:
    type: soft
    max_chars: 60
    notes: >-
      Product Hunt does not publish a strict limit, but staff guidance is to
      keep it short and brand-only. No taglines or emojis (unless the emoji is
      part of the actual product name).

  tagline:
    type: hard
    max_chars: 60
    notes: >-
      The single most important line on the launch. Outcome-driven, not
      clever. Should explain what the product does and for whom in one
      sentence. Appears next to the name on the homepage.

  description:
    type: hard
    max_chars: 260
    notes: >-
      Expands the tagline. Lead with the problem and primary benefit. Include
      one specific credible detail (a number, feature, or use case).

  topics:
    type: hard
    max_items: 3
    notes: Maximum 3 topics. Pick the most relevant categories.

  first_comment:
    type: soft
    min_words: 150
    max_words: 250
    notes: >-
      Product Hunt does not enforce a strict character cap, but performance
      data shows 150-250 words is the sweet spot (200 is the operator
      sweet spot). Should include a greeting, problem statement, origin
      story, product description, differentiators, optional launch offer,
      and a specific CTA question.

assets:
  thumbnail:
    size: 240x240
    notes: Square thumbnail.
  gallery:
    max_count: 8
    size: 1270x760
    notes: Up to 8 gallery images at the recommended size.
